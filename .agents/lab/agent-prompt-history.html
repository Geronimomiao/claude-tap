<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 系统提示词演进史</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d12; --bg-grid:#11141b; --panel:#14171f; --panel-2:#181c25;
    --line:#262b36; --line-soft:#1d212b; --ink:#e7eaf1; --ink-2:#aab2c2;
    --muted:#727b8d; --muted-2:#525a6b; --accent:#7cc7ff; --add:#7bdc8f; --rem:#ff7a93;
    --c-identity:#e0a458; --c-tools:#4cc9b0; --c-editing:#8aa0ff; --c-subagents:#f7768e;
    --c-planning:#9ece6a; --c-safety:#ff9e64; --c-format:#e88fc8; --c-skills:#bb9af7;
    --c-mcp:#56b6c2; --c-workflow:#6f9bf0; --c-models:#7dcfff;
    --font-display:"Fraunces",Georgia,serif; --font-serif:"Noto Serif SC",serif;
    --font-sans:"Noto Sans SC","Helvetica Neue",Arial,sans-serif;
    --font-mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{min-height:100vh;overflow-x:hidden;position:relative;
    background-image:radial-gradient(1100px 600px at 12% -8%, rgba(124,199,255,.10), transparent 60%),radial-gradient(900px 520px at 96% 4%, rgba(187,154,247,.07), transparent 62%);}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(var(--bg-grid) 1px, transparent 1px),linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size:44px 44px;-webkit-mask-image:radial-gradient(circle at 50% 12%, #000 0, transparent 72%);mask-image:radial-gradient(circle at 50% 12%, #000 0, transparent 72%);opacity:.45;}
  a{color:inherit}

  /* top reading progress */
  .rprog{position:fixed;top:0;left:0;height:3px;width:0;z-index:60;background:linear-gradient(90deg,var(--accent),#bb9af7);box-shadow:0 0 12px rgba(124,199,255,.5)}

  header{position:relative;z-index:3;padding:38px clamp(20px,5vw,72px) 16px;max-width:1320px;margin:0 auto}
  .eyebrow{display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);flex-wrap:wrap}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  .eyebrow a{color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--muted-2);transition:color .2s}
  .eyebrow a:hover{color:var(--accent)}

  .agent-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
  .atab{display:inline-flex;align-items:baseline;gap:8px;padding:9px 15px;border:1px solid var(--line);border-radius:11px;background:var(--panel);cursor:pointer;font-family:var(--font-mono);font-size:13.5px;color:var(--ink-2);transition:.18s;white-space:nowrap}
  .atab .cnt{font-size:10.5px;color:var(--muted)}
  .atab:hover{border-color:var(--accent);color:var(--ink);transform:translateY(-1px)}
  .atab.active{background:linear-gradient(180deg,#1e2c41,#16202f);border-color:var(--accent);color:#fff;box-shadow:0 0 0 1px rgba(124,199,255,.3), 0 10px 26px -16px rgba(124,199,255,.6)}
  .atab.active .cnt{color:var(--accent)}

  h1{margin:24px 0 0;font-weight:400;line-height:.94;letter-spacing:-.01em}
  h1 .mark{font-family:var(--font-display);font-size:clamp(40px,7vw,84px);font-weight:600;display:block;background:linear-gradient(180deg,#fff,#b3bdd2);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1 .sub{font-family:var(--font-serif);font-weight:700;font-size:clamp(15px,2.4vw,26px);color:var(--ink-2);display:block;margin-top:4px}
  .lede{margin-top:16px;max-width:680px;color:var(--ink-2);font-size:14.5px;line-height:1.72;font-weight:300}
  .lede b{color:var(--ink);font-weight:500}
  .lede code{font-family:var(--font-mono);font-size:.85em;color:var(--accent);background:rgba(124,199,255,.08);padding:1px 6px;border-radius:5px}
  .meta-row{margin-top:20px;display:flex;flex-wrap:wrap;gap:10px 24px;align-items:center;font-family:var(--font-mono);font-size:12.5px;color:var(--muted)}
  .meta-row .stat b{color:var(--ink);font-weight:700;font-size:15px}
  .meta-row .stat .u{color:var(--ink-2)}
  .meta-row .vline{width:1px;height:24px;background:var(--line)}

  .controls{position:relative;z-index:3;max-width:1320px;margin:22px auto 0;padding:0 clamp(20px,5vw,72px)}
  .controls .label{font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-2);margin-bottom:10px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:8px;padding:6px 12px 6px 10px;border:1px solid var(--line);border-radius:999px;background:var(--panel);cursor:pointer;font-family:var(--font-mono);font-size:12px;color:var(--ink-2);transition:.18s;user-select:none}
  .chip .sw{width:9px;height:9px;border-radius:2px;background:var(--cc);box-shadow:0 0 8px -1px var(--cc)}
  .chip .n{color:var(--muted);font-size:10.5px}
  .chip:hover{border-color:var(--cc);color:var(--ink);transform:translateY(-1px)}
  .chip[aria-pressed="true"]{background:color-mix(in srgb, var(--cc) 16%, var(--panel));border-color:var(--cc);color:#fff}
  .chip.all{--cc:var(--accent)}
  .chip.all .sw{background:linear-gradient(135deg,#7aa2f7,#bb9af7,#4cc9b0)}

  .tlhead{max-width:1040px;margin:30px auto 0;padding:0 clamp(20px,5vw,48px);display:flex;align-items:baseline;gap:14px}
  .tlhead h2{font-family:var(--font-serif);font-weight:500;font-size:16px;color:var(--ink-2)}
  .tlhead .hint{font-family:var(--font-mono);font-size:11.5px;color:var(--muted-2)}

  /* ---- vertical timeline ---- */
  .vwrap{max-width:1040px;margin:10px auto 0;padding:6px clamp(20px,5vw,48px) 20px;position:relative;z-index:2}
  .vtimeline{position:relative;padding:14px 0 8px}
  .vtimeline::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;transform:translateX(-50%);
    background:linear-gradient(180deg,transparent,rgba(124,199,255,.30) 2.5%,rgba(124,199,255,.30) 97.5%,transparent)}
  .vtimeline.nospine::before{display:none}

  .vmonth{position:relative;height:50px;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(10px);transition:.5s}
  .vmonth.in{opacity:1;transform:none}
  .vmonth .lab{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.12em;color:var(--ink-2);background:var(--bg);border:1px solid var(--line);padding:5px 14px;border-radius:999px;z-index:2}
  .vmonth .lab b{color:var(--ink);font-weight:500}

  .vrow{position:relative;width:50%;padding:11px 46px;box-sizing:border-box;display:flex;opacity:0;transition:opacity .5s, transform .5s}
  .vrow.left{left:0;justify-content:flex-end;transform:translateX(-18px)}
  .vrow.right{left:50%;justify-content:flex-start;transform:translateX(18px)}
  .vrow.in{opacity:1;transform:none}
  .vnode{position:absolute;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;background:var(--bg);border:2px solid var(--cc);z-index:3;cursor:pointer;box-shadow:0 0 0 4px color-mix(in srgb,var(--cc) 15%,transparent);transition:transform .18s,box-shadow .18s}
  .vnode::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--cc);box-shadow:0 0 10px var(--cc)}
  .vnode.lv3{width:24px;height:24px;border-width:2.5px}.vnode.lv3::after{inset:5px}
  .vrow.left .vnode{right:-9px}.vrow.right .vnode{left:-9px}
  .vrow.left.lv3 .vnode{right:-12px}.vrow.right.lv3 .vnode{left:-12px}
  .vrow:hover .vnode{transform:translateY(-50%) scale(1.16);box-shadow:0 0 0 7px color-mix(in srgb,var(--cc) 22%,transparent)}
  .vconn{position:absolute;top:50%;height:1.5px;transform:translateY(-50%);z-index:1}
  .vrow.left .vconn{right:0;width:46px;background:linear-gradient(90deg,transparent,var(--cc))}
  .vrow.right .vconn{left:0;width:46px;background:linear-gradient(270deg,transparent,var(--cc))}

  .vcard{width:100%;max-width:432px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:14px 16px 13px;cursor:pointer;position:relative;
    box-shadow:0 16px 36px -26px rgba(0,0,0,.9);transition:transform .2s,border-color .2s,box-shadow .2s}
  .vcard::before{content:"";position:absolute;left:0;top:0;height:100%;width:3px;border-radius:14px 0 0 14px;background:var(--cc);opacity:.85}
  .vcard:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--cc) 55%,var(--line));box-shadow:0 24px 46px -24px rgba(0,0,0,.95),0 0 0 1px color-mix(in srgb,var(--cc) 28%,transparent)}
  .vcard .crow{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .vcard .ver{font-family:var(--font-mono);font-weight:700;font-size:14.5px;color:var(--cc);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
  .vcard .badge{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2.5px 7px;border-radius:5px;border:1px solid color-mix(in srgb,var(--cc) 45%,transparent);color:var(--cc);white-space:nowrap}
  .vcard .badge.major{background:var(--cc);color:#0b0d12;border-color:var(--cc);font-weight:700}
  .vcard .sp{flex:1}
  .vcard .date{font-family:var(--font-mono);font-size:11px;color:var(--muted);white-space:nowrap}
  .vcard .cat{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;color:var(--ink-2);font-family:var(--font-mono);margin-bottom:9px}
  .vcard .cat .sw{width:7px;height:7px;border-radius:2px;background:var(--cc)}
  .vcard .title{font-family:var(--font-serif);font-weight:700;font-size:16px;line-height:1.36;color:var(--ink);margin-bottom:6px}
  .vcard .core{font-size:13px;line-height:1.58;color:var(--ink-2);font-weight:300;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .vcard .core code,.sheet code{font-family:var(--font-mono);font-size:.85em;color:var(--ink);background:rgba(255,255,255,.06);padding:0 4px;border-radius:4px}
  .vcard .foot{margin-top:11px;display:flex;align-items:center;gap:10px}
  .vcard .bars{flex:1;display:flex;align-items:center;height:7px;gap:2px;min-width:40px}
  .vcard .seg{height:7px;border-radius:2px;min-width:2px}
  .vcard .seg.a{background:linear-gradient(90deg,#5fae6e,var(--add))}
  .vcard .seg.r{background:linear-gradient(90deg,var(--rem),#d85f78)}
  .vcard .nums{font-family:var(--font-mono);font-size:10px;white-space:nowrap}
  .vcard .nums .pa{color:var(--add)}.vcard .nums .pr{color:var(--rem)}
  .vcard .more{font-family:var(--font-mono);font-size:10px;color:var(--muted);white-space:nowrap;transition:color .2s}
  .vcard:hover .more{color:var(--cc)}
  .vrow.dim{opacity:.12;filter:saturate(.3);pointer-events:none}

  .vend{position:relative;display:flex;justify-content:center;margin-top:8px}
  .vend .box{text-align:center;border:1px dashed var(--line);border-radius:12px;padding:15px 22px;background:rgba(20,23,31,.5);max-width:360px}
  .vend .v{font-family:var(--font-mono);font-weight:700;color:var(--ink);font-size:15px}
  .vend .d{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin:5px 0 8px}
  .vend .t{font-size:12px;color:var(--ink-2);line-height:1.6;font-weight:300}
  .vend .t b{color:var(--ink-2)}

  .stable{margin:30px auto;width:min(580px,90%);text-align:center;padding:36px 30px;border:1px dashed var(--line);border-radius:18px;background:rgba(20,23,31,.5)}
  .stable .ic{font-family:var(--font-mono);font-size:28px;color:var(--muted);margin-bottom:14px}
  .stable h3{font-family:var(--font-serif);font-weight:700;font-size:20px;color:var(--ink);margin-bottom:12px}
  .stable p{color:var(--ink-2);font-size:14px;line-height:1.78;font-weight:300}
  .stable p code{font-family:var(--font-mono);font-size:.85em;color:var(--accent);background:rgba(124,199,255,.08);padding:1px 6px;border-radius:5px}

  .modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:24px}
  .modal.open{display:flex}
  .modal .backdrop{position:absolute;inset:0;background:rgba(5,6,9,.74);backdrop-filter:blur(7px);animation:fade .25s forwards;opacity:0}
  @keyframes fade{to{opacity:1}}
  .sheet{position:relative;z-index:2;width:min(620px,100%);max-height:88vh;overflow:auto;background:linear-gradient(180deg,var(--panel-2),#10131a);border:1px solid var(--line);border-radius:18px;box-shadow:0 40px 90px -30px #000;animation:sheetin .32s cubic-bezier(.2,.9,.3,1) forwards;opacity:0}
  @keyframes sheetin{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
  .sheet .top{padding:24px 26px 18px;border-bottom:1px solid var(--line-soft);position:relative;overflow:hidden}
  .sheet .top::before{content:"";position:absolute;left:0;top:0;width:100%;height:3px;background:var(--cc)}
  .sheet .x{position:absolute;top:18px;right:18px;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:17px;cursor:pointer;transition:.18s}
  .sheet .x:hover{color:#fff;border-color:var(--cc)}
  .sheet .agtag{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .sheet .mver{font-family:var(--font-mono);font-weight:700;font-size:24px;color:var(--cc);letter-spacing:-.01em}
  .sheet .mmeta{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px;align-items:center;font-family:var(--font-mono);font-size:12px;color:var(--muted)}
  .sheet .mmeta .pill{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);color:var(--ink-2)}
  .sheet .mmeta .pill .sw{width:8px;height:8px;border-radius:2px;background:var(--cc)}
  .sheet .mmeta .pa{color:var(--add)}.sheet .mmeta .pr{color:var(--rem)}
  .sheet .mtitle{font-family:var(--font-serif);font-weight:700;font-size:20px;color:var(--ink);padding:20px 26px 4px;line-height:1.45}
  .sheet .msum{padding:6px 26px 4px;color:var(--ink-2);font-size:14px;line-height:1.7;font-weight:300}
  .sheet .dlabel{padding:18px 26px 0;font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2)}
  .sheet ul{list-style:none;padding:12px 26px 24px;display:flex;flex-direction:column;gap:11px}
  .sheet li{position:relative;padding-left:22px;font-size:13.5px;line-height:1.64;color:var(--ink-2);font-weight:300}
  .sheet li::before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:2px;background:var(--cc);box-shadow:0 0 8px -1px var(--cc)}
  .sheet .foot{padding:0 26px 24px}
  .sheet .foot a{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;color:var(--accent);text-decoration:none;border:1px solid color-mix(in srgb,var(--accent) 35%, var(--line));padding:9px 14px;border-radius:9px;transition:.18s}
  .sheet .foot a:hover{background:rgba(124,199,255,.1);border-color:var(--accent)}

  footer{position:relative;z-index:2;max-width:1320px;margin:18px auto 0;padding:24px clamp(20px,5vw,72px) 46px;border-top:1px solid var(--line-soft);display:flex;flex-wrap:wrap;justify-content:space-between;gap:14px;font-family:var(--font-mono);font-size:12px;color:var(--muted)}
  footer a{color:var(--ink-2);text-decoration:none;border-bottom:1px dotted var(--muted-2)}
  footer a:hover{color:var(--accent);border-color:var(--accent)}

  @media (max-width:760px){
    .vtimeline::before{left:20px}
    .vrow{width:100%;left:0!important;padding:9px 0 9px 48px!important;justify-content:flex-start!important;transform:translateX(16px)}
    .vrow.in{transform:none}
    .vrow .vnode{left:11px!important;right:auto!important}
    .vrow.lv3 .vnode{left:8px!important}
    .vrow .vconn{left:20px!important;right:auto!important;width:28px!important;background:linear-gradient(90deg,transparent,var(--cc))!important}
    .vmonth{justify-content:flex-start;padding-left:6px}
    .vcard{max-width:none}
  }
</style>
</head>
<body>
<div class="rprog" id="rprog"></div>
<header>
  <div class="eyebrow"><span class="dot"></span><span>PHISTORY · SYSTEM PROMPT DIFF</span><span>·</span><a id="srclink" href="https://phistory.cc/?agent=codex&range=latest" target="_blank" rel="noopener">phistory.cc ↗</a></div>
  <div class="agent-tabs" id="tabs"></div>
  <h1><span class="mark" id="agName">—</span><span class="sub">系统提示词演进史 · System Prompt Evolution</span></h1>
  <p class="lede">对各家 AI 编码 <b>Agent</b> 系统提示词公开变更记录的可视化，数据抓取自 <b>phistory.cc</b>。切换上方标签查看不同 Agent；时间轴自上而下标出每次<b>实质性变更</b>（已剔除纯版本号递增），点击卡片查看完整变更内容。</p>
  <div class="meta-row" id="stats"></div>
</header>

<div class="controls">
  <div class="label">按主题筛选 / FILTER</div>
  <div class="chips" id="chips"></div>
</div>

<div class="tlhead"><h2 id="tlh">变更时间轴</h2><span class="hint">↓ 向下滚动浏览</span></div>
<div class="vwrap"><div class="vtimeline" id="tl"></div></div>

<footer>
  <span>数据来源 · <a id="srclink2" href="https://phistory.cc/?agent=codex&range=latest" target="_blank" rel="noopener">phistory.cc</a></span>
  <span>变更概要由各版本 prompt.md 实测 diff 提炼 · 仅作研究用途</span>
</footer>

<div class="modal" id="modal" aria-hidden="true">
  <div class="backdrop" data-close></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>
</div>

<script>
const CATS = {
  identity:{label:"身份·人格",color:"var(--c-identity)"}, tools:{label:"工具·执行",color:"var(--c-tools)"},
  editing:{label:"编辑·代码",color:"var(--c-editing)"}, subagents:{label:"子智能体·并行",color:"var(--c-subagents)"},
  planning:{label:"规划·任务",color:"var(--c-planning)"}, safety:{label:"权限·安全",color:"var(--c-safety)"},
  format:{label:"输出·格式",color:"var(--c-format)"}, skills:{label:"技能·插件",color:"var(--c-skills)"},
  mcp:{label:"MCP·集成",color:"var(--c-mcp)"}, workflow:{label:"结构·流程",color:"var(--c-workflow)"},
  models:{label:"模型",color:"var(--c-models)"},
};
const CATORDER=["identity","tools","editing","subagents","planning","safety","format","skills","mcp","workflow","models"];

const MONTH_CN={1:"1月",2:"2月",3:"3月",4:"4月",5:"5月",6:"6月",7:"7月",8:"8月",9:"9月",10:"10月",11:"11月",12:"12月"};

const tl=document.getElementById('tl');
let cur=0, active=new Set(), io=null;

function cnDate(d){const[y,m,day]=d.split('-');return `${y}.${m}.${day}`;}
function monthKey(d){return d.slice(0,7);}

function build(ag){
  if(io)io.disconnect();
  tl.innerHTML='';tl.classList.remove('nospine');
  const ch=ag.changes;
  if(!ch.length){
    const s=document.createElement('div');s.className='stable';
    s.innerHTML=`<div class="ic">≡ ✓</div><h3>提示词正文保持稳定</h3><p>${ag.stable||'此 Agent 在抓取区间内没有实质性的提示词变更。'}</p>`;
    tl.classList.add('nospine');tl.appendChild(s);
    return;
  }
  const maxchurn=Math.max(...ch.map(c=>c.add+c.rem),1), BARMAX=96;
  let lastMonth=null;
  ch.forEach((m,i)=>{
    const mk=monthKey(m.date), cc=CATS[m.cat]?CATS[m.cat].color:'var(--muted)';
    if(mk!==lastMonth){
      const[yy,mm]=m.date.split('-');
      const mo=document.createElement('div');mo.className='vmonth reveal';
      mo.innerHTML=`<div class="lab"><b>${yy}</b> · ${MONTH_CN[parseInt(mm)]}</div>`;
      tl.appendChild(mo);lastMonth=mk;
    }
    const side=i%2===0?'left':'right';
    const aw=Math.max(2,Math.round(m.add/maxchurn*BARMAX)), rw=Math.max(m.rem>0?2:0,Math.round(m.rem/maxchurn*BARMAX));
    const clabel=CATS[m.cat]?CATS[m.cat].label:m.cat;
    const row=document.createElement('div');
    row.className=`vrow reveal ${side}${m.level===3?' lv3':''}`;row.dataset.cat=m.cat;row.dataset.i=i;row.style.setProperty('--cc',cc);
    row.innerHTML=`
      <div class="vconn"></div><div class="vnode ${m.level===3?'lv3':''}"></div>
      <div class="vcard">
        <div class="crow"><span class="ver">${m.v}</span><span class="badge ${m.level===3?'major':''}">${m.level===3?'重大':(m.level===2?'更新':'微调')}</span><span class="sp"></span><span class="date">${cnDate(m.date)}</span></div>
        <div class="cat"><span class="sw"></span>${clabel}</div>
        <div class="title">${m.title}</div>
        <div class="core">${m.core||m.summary}</div>
        <div class="foot"><div class="bars"><span class="seg a" style="width:${aw}px"></span>${m.rem>0?`<span class="seg r" style="width:${rw}px"></span>`:''}</div><div class="nums"><span class="pa">+${m.add}</span> <span class="pr">−${m.rem}</span></div><div class="more">详情 →</div></div>
      </div>`;
    tl.appendChild(row);
  });
  const lastDate=ch[ch.length-1].date;
  const tail = ag.last>lastDate ? `其后至 <b>${ag.latest}</b> 多为版本号递增或微调，无重大变更。` : `当前最新版本。`;
  const end=document.createElement('div');end.className='vend reveal';
  end.innerHTML=`<div class="box"><div class="v">${ag.latest}</div><div class="d">${ag.last?cnDate(ag.last):''} · 现状</div><div class="t">${tail}</div></div>`;
  tl.appendChild(end);

  // reveal on scroll
  io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}})},{rootMargin:'0px 0px -8% 0px',threshold:.12});
  tl.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}

function buildLegend(ag){
  const el=document.getElementById('chips');el.innerHTML='';
  const present=CATORDER.filter(c=>ag.changes.some(x=>x.cat===c));
  const all=document.createElement('button');all.className='chip all';all.dataset.cat='all';all.setAttribute('aria-pressed','true');
  all.innerHTML='<span class="sw"></span>全部';el.appendChild(all);
  present.forEach(c=>{
    const n=ag.changes.filter(x=>x.cat===c).length;
    const b=document.createElement('button');b.className='chip';b.dataset.cat=c;b.setAttribute('aria-pressed','false');
    b.style.setProperty('--cc',CATS[c].color);
    b.innerHTML=`<span class="sw"></span>${CATS[c].label}<span class="n">${n}</span>`;el.appendChild(b);
  });
  document.querySelector('.controls').style.display = ag.changes.length?'block':'none';
}
function setStats(ag){
  const lv3=ag.changes.filter(c=>c.level===3).length;
  const feat = ag.changes.length ? `<span class="stat"><b>${ag.changes.length}</b> <span class="u">次实质变更</span></span><span class="vline"></span><span class="stat"><b>${lv3}</b> <span class="u">次重大</span></span>` : `<span class="stat"><b>0</b> <span class="u">次实质变更 · 正文稳定</span></span>`;
  document.getElementById('stats').innerHTML=`<span class="stat"><b>${ag.total}</b> <span class="u">个版本</span></span><span class="vline"></span>`+feat+`<span class="vline"></span><span class="stat"><span class="u">最新</span> <b>${ag.latest}</b></span>`;
}
function render(i){
  cur=i;active.clear();
  const ag=AGENTS[i];
  try{history.replaceState(null,'','#'+ag.id);}catch(e){}
  document.querySelectorAll('.atab').forEach((t,k)=>t.classList.toggle('active',k===i));
  document.getElementById('agName').textContent=ag.name;
  const url=`https://phistory.cc/?agent=${ag.id}&range=latest`;
  document.getElementById('srclink').href=url;document.getElementById('srclink2').href=url;
  document.getElementById('tlh').textContent=`${ag.name} · 变更时间轴`;
  setStats(ag);buildLegend(ag);
  document.querySelector('.vtimeline').style.background='';
  build(ag);
  window.scrollTo({top:0,behavior:'auto'});
}

const tabsEl=document.getElementById('tabs');
AGENTS.forEach((a,i)=>{
  const b=document.createElement('button');b.className='atab';
  b.innerHTML=`${a.name}<span class="cnt">${a.changes.length?a.changes.length:'稳定'}</span>`;
  b.onclick=()=>render(i);tabsEl.appendChild(b);
});

document.getElementById('chips').addEventListener('click',e=>{
  const btn=e.target.closest('.chip');if(!btn)return;
  const cat=btn.dataset.cat;
  if(cat==='all')active.clear();else{active.has(cat)?active.delete(cat):active.add(cat);}
  [...document.getElementById('chips').children].forEach(ch=>{const c=ch.dataset.cat;ch.setAttribute('aria-pressed',c==='all'?(active.size===0):active.has(c));});
  document.querySelectorAll('.vrow').forEach(s=>{const show=active.size===0||active.has(s.dataset.cat);s.classList.toggle('dim',!show);});
});

const modal=document.getElementById('modal'),sheet=document.getElementById('sheet');
function openModal(i){
  const ag=AGENTS[cur],m=ag.changes[i],cc=CATS[m.cat]?CATS[m.cat].color:'var(--muted)';
  sheet.style.setProperty('--cc',cc);
  const lvl=m.level===3?'重大变更':(m.level===2?'更新':'微调');
  sheet.innerHTML=`
    <div class="top"><button class="x" data-close aria-label="关闭">✕</button>
      <div class="agtag">${ag.name}</div><div class="mver">${m.v}</div>
      <div class="mmeta"><span class="pill"><span class="sw"></span>${CATS[m.cat]?CATS[m.cat].label:m.cat}</span><span>▸ ${cnDate(m.date)}</span><span class="pill">${lvl}</span><span><span class="pa">+${m.add}</span> / <span class="pr">−${m.rem}</span> 行</span></div></div>
    <div class="mtitle">${m.title}</div>
    <div class="msum">${m.summary}</div>
    <div class="dlabel">变更主体内容</div>
    <ul>${(m.detail||[]).slice(0,5).map(d=>`<li>${d}</li>`).join('')}</ul>
    <div class="foot"><a href="https://phistory.cc/?agent=${ag.id}&range=latest" target="_blank" rel="noopener">在 phistory 查看完整 diff ↗</a></div>`;
  modal.classList.add('open');modal.setAttribute('aria-hidden','false');
}
function closeModal(){modal.classList.remove('open');modal.setAttribute('aria-hidden','true');}
tl.addEventListener('click',e=>{const row=e.target.closest('.vrow');if(row)openModal(+row.dataset.i);});
modal.addEventListener('click',e=>{if(e.target.closest('[data-close]'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

const rprog=document.getElementById('rprog');
function onScroll(){const h=document.documentElement;const max=h.scrollHeight-h.clientHeight;rprog.style.width=(max>0?(h.scrollTop/max*100):0)+'%';}
window.addEventListener('scroll',onScroll,{passive:true});window.addEventListener('resize',onScroll);

function idxFromHash(){const id=decodeURIComponent((location.hash||'').replace(/^#/,''));const k=AGENTS.findIndex(a=>a.id===id);return k>=0?k:0;}
window.addEventListener('hashchange',()=>{const k=idxFromHash();if(k!==cur)render(k);});
render(idxFromHash());onScroll();
</script>
</body>
</html>
