<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>第一性原理网页 · Codex vs Claude Code</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#2a2f3a; --fg:#e6e8ec; --mut:#9aa3b2; --accent:#5b9dff; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;
         background:var(--bg); color:var(--fg); }
  header { padding:22px 28px; border-bottom:1px solid var(--line); }
  h1 { margin:0 0 4px; font-size:20px; letter-spacing:.3px; }
  header p { margin:0; color:var(--mut); font-size:13px; }
  .links { display:flex; gap:12px; padding:16px 28px; flex-wrap:wrap; }
  .links a { text-decoration:none; color:var(--fg); background:var(--panel); border:1px solid var(--line);
             padding:10px 16px; border-radius:10px; font-size:14px; transition:.15s; }
  .links a:hover { border-color:var(--accent); color:var(--accent); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line);
          height:calc(100vh - 150px); }
  @media (max-width:900px){ .grid{ grid-template-columns:1fr; height:auto; } .frame{ height:80vh; } }
  .frame { background:var(--bg); display:flex; flex-direction:column; }
  .cap { padding:8px 14px; font-size:13px; color:var(--mut); background:var(--panel); border-bottom:1px solid var(--line); }
  .cap b { color:var(--fg); }
  iframe { flex:1; width:100%; border:0; background:#fff; min-height:70vh; }
</style>
</head>

  </nav>

    <div class="frame"><div class="cap"><b>Claude Code</b> — cmp_claude/index.html</div><iframe src="cmp_claude/index.html"></iframe></div>
  </div>
</body>
